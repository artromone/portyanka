name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - goos: darwin
            goarch: amd64
            target: x86_64-apple-darwin
            os: ubuntu-latest
          - goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -trimpath -o portyanka .

      - name: Package
        run: |
          tar czf portyanka-${{ matrix.target }}.tar.gz portyanka

      - uses: actions/upload-artifact@v4
        with:
          name: portyanka-${{ matrix.target }}
          path: portyanka-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: portyanka-*.tar.gz

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "aarch64_mac=$(shasum -a 256 portyanka-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_mac=$(shasum -a 256 portyanka-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(shasum -a 256 portyanka-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v4
        with:
          repository: odysa/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          V="${GITHUB_REF_NAME#v}"
          A="${{ steps.sha.outputs.aarch64_mac }}"
          X="${{ steps.sha.outputs.x86_64_mac }}"
          L="${{ steps.sha.outputs.x86_64_linux }}"
          {
            echo 'class Portyanka < Formula'
            echo '  desc "A minimal Go TUI for inspecting listening TCP ports and killing processes"'
            echo '  homepage "https://github.com/odysa/portyanka"'
            echo "  version \"$V\""
            echo '  license "MIT"'
            echo ''
            echo '  on_macos do'
            echo '    on_arm do'
            echo "      url \"https://github.com/odysa/portyanka/releases/download/v$V/portyanka-aarch64-apple-darwin.tar.gz\""
            echo "      sha256 \"$A\""
            echo '    end'
            echo '    on_intel do'
            echo "      url \"https://github.com/odysa/portyanka/releases/download/v$V/portyanka-x86_64-apple-darwin.tar.gz\""
            echo "      sha256 \"$X\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  on_linux do'
            echo '    on_intel do'
            echo "      url \"https://github.com/odysa/portyanka/releases/download/v$V/portyanka-x86_64-unknown-linux-gnu.tar.gz\""
            echo "      sha256 \"$L\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    bin.install "portyanka"'
            echo '  end'
            echo 'end'
          } > homebrew-tap/Formula/portyanka.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/portyanka.rb
          git commit -m "Update portyanka to ${GITHUB_REF_NAME}"
          git push
